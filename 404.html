<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Seite nicht gefunden | crubiosec.dev</title>
  <style>
    :root{--bg:#0b1020;--accent:#00e0a4;--text:#e6eefc;--muted:#8aa0c7}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0b1020,#0d1430);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
    h1{font-size:5rem;background:linear-gradient(90deg,var(--accent),#4dd0e1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    p{color:var(--muted);margin:15px 0;font-size:1.1rem}
    a{display:inline-block;margin-top:20px;padding:12px 28px;background:var(--accent);color:#0b1020;text-decoration:none;border-radius:8px;font-weight:600;transition:opacity .2s}
    a:hover{opacity:.85}
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>Diese Seite wurde nicht gefunden.</p>
    <a href="/">Zur Startseite</a>
  </div>
</body>
</html>
